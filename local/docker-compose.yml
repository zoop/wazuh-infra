version: '3.8'

services:

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.2
    container_name: wazuh-indexer
    hostname: wazuh-indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh-indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./config/wazuh-indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
      - ./certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer.pem
      - ./certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer-key.pem
      - ./certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 -u admin:${INDEXER_PASSWORD:-REDACTED_INDEXER_PASSWORD} | grep -q 'wazuh-indexer'"]
      interval: 30s
      timeout: 10s
      retries: 5

  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    container_name: wazuh-manager
    hostname: wazuh-manager
    restart: always
    ports:
      - "1514:1514/tcp"   # Agent communication
      - "1515:1515/tcp"   # Agent enrollment
      - "514:514/udp"     # Syslog
      - "55000:55000/tcp" # Wazuh API
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD:-REDACTED_INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat-key.pem
      - API_USERNAME=${API_USERNAME:-wazuh-wui}
      - API_PASSWORD=${API_PASSWORD:-REDACTED_WAZUH_API_PASSWORD}
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-queue:/var/ossec/queue
      - ./certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./certs/wazuh-manager.pem:/etc/ssl/filebeat.pem
      - ./certs/wazuh-manager-key.pem:/etc/ssl/filebeat-key.pem
    depends_on:
      wazuh-indexer:
        condition: service_healthy

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    restart: always
    ports:
      - "443:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD:-REDACTED_INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh-manager
      - DASHBOARD_USERNAME=${API_USERNAME:-wazuh-wui}
      - DASHBOARD_PASSWORD=${API_PASSWORD:-REDACTED_WAZUH_API_PASSWORD}
      - API_USERNAME=${API_USERNAME:-wazuh-wui}
      - API_PASSWORD=${API_PASSWORD:-REDACTED_WAZUH_API_PASSWORD}
    volumes:
      - ./certs/wazuh-dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./certs/wazuh-dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./config/wazuh-dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./config/wazuh-dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
    depends_on:
      - wazuh-manager
      - wazuh-indexer

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
  wazuh-manager-logs:
  wazuh-manager-queue:
