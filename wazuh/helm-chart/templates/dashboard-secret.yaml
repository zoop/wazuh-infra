apiVersion: v1
kind: Secret
metadata:
  name: wazuh-dashboard-wazuh-yml
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-18"
type: Opaque
stringData:
  wazuh.yml: |
    hosts:
      - default:
          url: "https://wazuh-manager-api"
          port: {{ .Values.service.apiPort }}
          username: {{ .Values.secrets.apiUsername | quote }}
          password: {{ .Values.secrets.apiPassword | quote }}
          run_as: false
