apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-manager-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
data:
  ossec.conf: |
    <ossec_config>
      <global>
        <jsonout_output>yes</jsonout_output>
        <alerts_log>yes</alerts_log>
        <logall>no</logall>
        <logall_json>no</logall_json>
        <email_notification>no</email_notification>
        <agents_disconnection_time>10m</agents_disconnection_time>
        <agents_disconnection_alert_id>504</agents_disconnection_alert_id>
      </global>

      <alerts>
        <log_alert_level>{{ .Values.wazuh.alertLevel }}</log_alert_level>
        <email_alert_level>12</email_alert_level>
      </alerts>

      <remote>
        <connection>secure</connection>
        <port>{{ .Values.service.agentPort }}</port>
        <protocol>tcp</protocol>
        <queue_size>131072</queue_size>
      </remote>

      {{- if .Values.iris.enabled }}
      <!-- IRIS Integration - sends alerts level 3+ to IRIS as cases -->
      <integration>
        <name>custom-iris</name>
        <hook_url>{{ .Values.iris.hookUrl }}</hook_url>
        <api_key>{{ .Values.iris.apiKey }}</api_key>
        <level>3</level>
        <alert_format>json</alert_format>
      </integration>
      {{- end }}

      <ruleset>
        <decoder_dir>ruleset/decoders</decoder_dir>
        <rule_dir>ruleset/rules</rule_dir>
        <list>etc/lists/audit-keys</list>
        <list>etc/lists/security-eventchannel</list>
      </ruleset>

      <syscheck>
        <disabled>no</disabled>
        <frequency>43200</frequency>
        <scan_on_start>yes</scan_on_start>
        <alert_new_files>yes</alert_new_files>
      </syscheck>

      <rootcheck>
        <disabled>no</disabled>
        <frequency>43200</frequency>
      </rootcheck>

      <wodle name="syscollector">
        <disabled>no</disabled>
        <interval>1h</interval>
        <scan_on_start>yes</scan_on_start>
        <hardware>yes</hardware>
        <os>yes</os>
        <network>yes</network>
        <packages>yes</packages>
        <ports all="no">yes</ports>
        <processes>yes</processes>
      </wodle>

      <sca>
        <enabled>yes</enabled>
        <scan_on_start>yes</scan_on_start>
        <interval>12h</interval>
      </sca>

      <active-response>
        <disabled>no</disabled>
      </active-response>
    </ossec_config>
