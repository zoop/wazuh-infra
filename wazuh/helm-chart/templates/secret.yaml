apiVersion: v1
kind: Secret
metadata:
  name: wazuh-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-18"
type: Opaque
stringData:
  indexer-username: {{ .Values.secrets.indexerUsername | quote }}
  indexer-password: {{ .Values.secrets.indexerPassword | quote }}
  api-username: {{ .Values.secrets.apiUsername | quote }}
  api-password: {{ .Values.secrets.apiPassword | quote }}
  {{- if .Values.iris.enabled }}
  iris-api-key: {{ .Values.iris.apiKey | quote }}
  {{- end }}
