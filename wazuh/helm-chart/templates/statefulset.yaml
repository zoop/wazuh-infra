apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wazuh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: manager
  serviceName: wazuh-manager
  template:
    metadata:
      labels:
        {{- include "wazuh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: {{ include "wazuh.serviceAccountName" . }}
      initContainers:
        - name: wait-for-certs
          image: "alpine/k8s:1.30.0"
          command:
            - /bin/bash
            - -c
            - |
              until kubectl get secret wazuh-certs -n {{ .Values.namespace }} >/dev/null 2>&1; do
                echo "waiting for wazuh-certs secret..."
                sleep 3
              done
      containers:
        - name: wazuh-manager
          image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}"
          imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
          ports:
            - name: agent
              containerPort: {{ .Values.service.agentPort }}
              protocol: TCP
            - name: enrollment
              containerPort: {{ .Values.service.enrollmentPort }}
              protocol: TCP
            - name: api
              containerPort: {{ .Values.service.apiPort }}
              protocol: TCP
          env:
            - name: INDEXER_URL
              value: "https://wazuh-indexer:9200"
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secrets
                  key: indexer-username
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secrets
                  key: indexer-password
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: "full"
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: "/etc/ssl/root-ca.pem"
            - name: SSL_CERTIFICATE
              value: "/etc/ssl/filebeat.pem"
            - name: SSL_KEY
              value: "/etc/ssl/filebeat.key"
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secrets
                  key: api-username
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secrets
                  key: api-password
          volumeMounts:
            - name: wazuh-config
              mountPath: /var/ossec/etc/ossec.conf
              subPath: ossec.conf
            - name: certs
              mountPath: /etc/ssl
              readOnly: true
            - name: wazuh-data
              mountPath: /var/ossec/data
            - name: wazuh-logs
              mountPath: /var/ossec/logs
            - name: wazuh-queue
              mountPath: /var/ossec/queue
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.agentPort }}
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: {{ .Values.service.agentPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: wazuh-config
          configMap:
            name: wazuh-manager-config
        - name: certs
          secret:
            secretName: wazuh-certs
            items:
              - key: root-ca.pem
                path: root-ca.pem
              - key: wazuh-manager.pem
                path: filebeat.pem
              - key: wazuh-manager-key.pem
                path: filebeat.key
  volumeClaimTemplates:
    - metadata:
        name: wazuh-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.manager.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.manager.storage.size }}
    - metadata:
        name: wazuh-logs
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.manager.storage.storageClass }}
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: wazuh-queue
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.manager.storage.storageClass }}
        resources:
          requests:
            storage: 10Gi
