apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "wazuh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "wazuh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: {{ include "wazuh.serviceAccountName" . }}
      initContainers:
        - name: wait-for-certs
          image: "alpine/k8s:1.30.0"
          command:
            - /bin/bash
            - -c
            - |
              until kubectl get secret wazuh-certs -n {{ .Values.namespace }} >/dev/null 2>&1; do
                echo "waiting for wazuh-certs secret..."
                sleep 3
              done
      containers:
        - name: wazuh-dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: https
              containerPort: 5601
              protocol: TCP
          env:
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secrets
                  key: indexer-username
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secrets
                  key: indexer-password
            - name: WAZUH_API_URL
              value: "https://wazuh-manager-api"
            - name: DASHBOARD_USERNAME
              value: "kibanaserver"
            - name: DASHBOARD_PASSWORD
              value: "kibanaserver"
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secrets
                  key: api-username
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secrets
                  key: api-password
          volumeMounts:
            - name: dashboard-config
              mountPath: /usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml
            - name: wazuh-yml
              mountPath: /usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
              subPath: wazuh.yml
            - name: certs
              mountPath: /usr/share/wazuh-dashboard/certs
              readOnly: true
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: dashboard-config
          configMap:
            name: wazuh-dashboard-config
        - name: wazuh-yml
          secret:
            secretName: wazuh-dashboard-wazuh-yml
        - name: certs
          secret:
            secretName: wazuh-certs
            items:
              - key: wazuh-dashboard.pem
                path: wazuh-dashboard.pem
              - key: wazuh-dashboard-key.pem
                path: wazuh-dashboard-key.pem
              - key: root-ca.pem
                path: root-ca.pem
