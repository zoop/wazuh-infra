apiVersion: v1
kind: Service
metadata:
  name: wazuh-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
  {{- if eq .Values.dashboardService.type "LoadBalancer" }}
  annotations:
    cloud.google.com/load-balancer-type: "External"
  {{- end }}
spec:
  type: {{ .Values.dashboardService.type }}
  {{- if and (eq .Values.dashboardService.type "LoadBalancer") .Values.dashboardService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml .Values.dashboardService.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  selector:
    {{- include "wazuh.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
