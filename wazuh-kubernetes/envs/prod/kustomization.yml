apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../wazuh
- istio-gateway.yaml
- wazuh-dashboard-tls.yaml
patches:
- path: storage-class.yaml
- path: indexer-resources.yaml
- path: dashboard-resources.yaml
- path: wazuh-master-resources.yaml
- path: wazuh-worker-resources.yaml
- path: indexer-api-svc-clusterip.yaml
- path: dashboard-svc-clusterip.yaml
- path: wazuh-svc-clusterip.yaml
- path: wazuh-workers-svc-clusterip.yaml

# Deployed to project/cluster "zoop-ops" (single node pool "ops-pool") — no
# node-selector patch is applied since pinning is unnecessary with only one
# pool. The *-node-selector.yaml files still say "dev-stage-spot-3" (leftover
# from envs/dev) and are intentionally left unreferenced here.
# - path: indexer-node-selector.yaml
# - path: wazuh-master-node-selector.yaml
# - path: wazuh-worker-node-selector.yaml
# - path: dashboard-node-selector.yaml
