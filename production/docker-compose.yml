version: '3.8'

services:

  # ─────────────────────────────────────────
  # WAZUH INDEXER (OpenSearch)
  # ─────────────────────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.5
    platform: linux/amd64
    container_name: wazuh-indexer
    hostname: wazuh-indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh-indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - ./config/wazuh-indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml
      - ./certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem
      - ./certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key
      - ./certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ./certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 | grep -q 'Unauthorized'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # WAZUH MANAGER
  # ─────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    platform: linux/amd64
    container_name: wazuh-manager
    hostname: wazuh-manager
    restart: always
    ports:
      - "1514:1514/tcp"
      - "1515:1515/tcp"
      - "514:514/udp"
      - "55000:55000/tcp"
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-queue:/var/ossec/queue
      - ./certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./certs/wazuh-manager.pem:/etc/ssl/filebeat.pem
      - ./certs/wazuh-manager-key.pem:/etc/ssl/filebeat.key
      - ./config/wazuh-manager/ossec.conf:/var/ossec/etc/ossec.conf
      - ./config/wazuh-manager/custom-iris.py:/var/ossec/integrations/custom-iris.py
    depends_on:
      wazuh-indexer:
        condition: service_healthy

  # ─────────────────────────────────────────
  # WAZUH DASHBOARD
  # ─────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.14.5
    platform: linux/amd64
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    restart: always
    ports:
      - "443:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh-manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
    volumes:
      - ./certs/wazuh-dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./certs/wazuh-dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./config/wazuh-dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./config/wazuh-dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
    depends_on:
      - wazuh-manager
      - wazuh-indexer

  # ─────────────────────────────────────────
  # IRIS — Incident Response Platform
  # ─────────────────────────────────────────
  iris-db:
    image: postgres:13
    container_name: iris-db
    restart: always
    environment:
      POSTGRES_DB: iris_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - iris-db-data:/var/lib/postgresql/data

  iris-rabbitmq:
    image: rabbitmq:3-management
    container_name: iris-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

  iris-web:
    image: ghcr.io/dfir-iris/iriswebapp_app:latest
    container_name: iris-web
    restart: always
    command: ["/bin/bash", "/iriswebapp/iris-entrypoint.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_SERVER: iris-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: iris_db
      IRIS_SECRET_KEY: ${IRIS_SECRET_KEY}
      IRIS_SECURITY_PASSWORD_SALT: ${IRIS_SECURITY_PASSWORD_SALT}
      CELERY_BROKER: ${CELERY_BROKER}
      IRIS_ADM_EMAIL: ${IRIS_ADM_EMAIL}
      IRIS_ADM_PASSWORD: ${IRIS_ADM_PASSWORD}
      IRIS_ADM_USERNAME: administrator
    depends_on:
      - iris-db
      - iris-rabbitmq

  iris-worker:
    image: ghcr.io/dfir-iris/iriswebapp_app:latest
    container_name: iris-worker
    restart: always
    command: ["/bin/bash", "/iriswebapp/iris-entrypoint.sh", "iris-worker"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_SERVER: iris-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: iris_db
      CELERY_BROKER: ${CELERY_BROKER}
      IRIS_SECRET_KEY: ${IRIS_SECRET_KEY}
      IRIS_SECURITY_PASSWORD_SALT: ${IRIS_SECURITY_PASSWORD_SALT}
    depends_on:
      - iris-db
      - iris-rabbitmq

  iris-nginx:
    image: ghcr.io/dfir-iris/iriswebapp_nginx:latest
    container_name: iris-nginx
    restart: always
    ports:
      - "8443:443"
    environment:
      INTERFACE_HTTPS_PORT: 443
      IRIS_UPSTREAM_SERVER: iris-web
      IRIS_UPSTREAM_PORT: 8000
      SERVER_NAME: localhost
      CERT_FILENAME: iris.crt
      KEY_FILENAME: iris.key
    volumes:
      - ./certs/wazuh-dashboard.pem:/www/certs/iris.crt
      - ./certs/wazuh-dashboard-key.pem:/www/certs/iris.key
    depends_on:
      - iris-web

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
  wazuh-manager-logs:
  wazuh-manager-queue:
  iris-db-data:
